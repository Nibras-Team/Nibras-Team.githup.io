<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرحباً بك في موقع المنظمة</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 1rem;
        }
        p {
            line-height: 1.6;
            color: #7f8c8d;
        }
        .btn {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 10px 25px;
            background-color: #2ecc71;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 الموقع يعمل بنجاح!</h1>
        <p>مرحباً بك في الواجهة الرئيسية لمنظمتك على GitHub. هذا الموقع هو نقطة البداية لتنظيم مشاريعك، أرشيفك الرقمي، أو أي محتوى تخطط لمشاركته.</p>
        <a href="https://github.com" class="btn">لوحة التحكم</a>
    </div>

</body>
</html>
